<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Integration Hub</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <i class="fab fa-github"></i>
            <h1>GitHub Integration Hub</h1>
        </div>
        <div class="header-right">
            <div id="user-info"></div>
            <div class="theme-toggle">
                <i class="fas fa-moon"></i>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="sidebar-item active" data-view="repos">
                <i class="fas fa-book"></i>
                Repositories
            </div>
            <div class="sidebar-item" data-view="prs">
                <i class="fas fa-code-branch"></i>
                Pull Requests
            </div>
            <div class="sidebar-item" data-view="issues">
                <i class="fas fa-exclamation-circle"></i>
                Issues
            </div>
            <div class="sidebar-item" data-view="actions">
                <i class="fas fa-play-circle"></i>
                Actions
            </div>
            <div class="sidebar-item" data-view="projects">
                <i class="fas fa-project-diagram"></i>
                Projects
            </div>
        </div>

        <div class="main-content">
            <div class="action-panel">
                <button class="button primary" id="new-repo-btn">
                    <i class="fas fa-plus"></i> New Repository
                </button>
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search repositories...">
                </div>
            </div>

            <div id="content-area">
                <div id="repos-view" class="view active">
                    <div class="repo-list" id="repo-list"></div>
                </div>
                <div id="prs-view" class="view">
                    <div class="pr-list" id="pr-list"></div>
                </div>
                <div id="issues-view" class="view">
                    <div class="issue-list" id="issue-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="new-repo-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Repository</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="new-repo-form">
                    <div class="form-group">
                        <label>Repository Name</label>
                        <input type="text" name="repo-name" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="repo-description"></textarea>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" name="repo-private">
                            Private repository
                        </label>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="button primary">Create Repository</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="file-explorer-modal" class="modal">
        <div class="modal-content large">
            <div class="modal-header">
                <h2>Repository Explorer</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="file-explorer-container">
                    <div class="file-explorer-sidebar">
                        <div class="branch-selector">
                            <select id="branch-select"></select>
                        </div>
                        <div class="file-tree" id="file-tree"></div>
                    </div>
                    <div class="file-content-area">
                        <div class="file-header">
                            <span id="current-file-path"></span>
                            <div class="file-actions">
                                <button class="button" id="edit-file-btn">Edit</button>
                                <button class="button" id="delete-file-btn">Delete</button>
                            </div>
                        </div>
                        <div id="file-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
